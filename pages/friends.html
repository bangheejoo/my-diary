<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나만의 일기장</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="app-container">

    <!-- 헤더 -->
    <header class="app-header">
      <span class="logo">친구의 하루</span>
      <button class="btn-icon" id="addFriendBtn" title="친구 추가">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
        </svg>
      </button>
    </header>

    <!-- 탭 -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tabFeed">최근 하루</button>
      <button class="tab-btn" id="tabCalendar">달력 보기</button>
    </div>

    <!-- 친구 필터 -->
    <div style="padding:0.75rem 1rem;border-bottom:1px solid var(--gray-100);overflow-x:auto;white-space:nowrap">
      <div id="friendFilter" style="display:inline-flex;gap:0.5rem">
        <button class="badge badge-pink" style="cursor:pointer;padding:0.35rem 0.85rem;font-size:0.8rem" data-uid="all">전체 친구</button>
      </div>
    </div>

    <main class="main-content">

      <!-- 피드 뷰 -->
      <div id="feedView">
        <div id="friendPostList">
          <div class="loading-screen"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- 캘린더 뷰 -->
      <div id="friendCalendarView" class="hidden">
        <div class="calendar-container">
          <div class="calendar-header">
            <button class="btn-icon" id="prevMonth">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
              </svg>
            </button>
            <span class="calendar-title" id="calendarTitle"></span>
            <button class="btn-icon" id="nextMonth">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
              </svg>
            </button>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        <div id="calendarPosts"></div>
      </div>

    </main>

    <!-- 바텀 네비게이션 -->
    <nav class="bottom-nav">
      <a class="nav-item" href="main.html">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
        <span>홈</span>
      </a>
      <a class="nav-item active" href="friends.html">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" /></svg>
        <span>친구</span>
      </a>
      <a class="nav-item" href="mypage.html">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        <span>내정보</span>
      </a>
    </nav>
  </div>

  <!-- 친구 추가 모달 -->
  <div class="modal-overlay hidden" id="addFriendModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title">친구 추가</p>
      <div class="search-bar" style="margin-bottom:1rem">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803a7.5 7.5 0 0010.607 10.607z" />
        </svg>
        <input class="form-input" type="text" id="friendSearchInput" placeholder="이메일 또는 닉네임으로 검색해 보세요" />
      </div>
      <button class="btn btn-primary btn-full" id="friendSearchBtn">검색</button>
      <div id="searchResults" style="margin-top:1rem"></div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="../js/friends/list.js"></script>
  <script type="module" src="../js/friends/add.js"></script>
</body>
</html>
