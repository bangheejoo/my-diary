<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나만의 일기장</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <h1>비밀번호 찾기</h1>
        <p>가입한 이메일로 재설정 링크를 보내드려요</p>
      </div>

      <!-- 전송 전 폼 -->
      <form class="auth-form" id="resetForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">이메일 (아이디)</label>
          <input class="form-input" type="email" id="email" placeholder="가입한 이메일을 입력해 주세요" autocomplete="email" />
          <p class="err-msg"></p>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-full" id="resetBtn">
          재설정 링크 보내기
        </button>

        <p class="text-center text-sm text-muted">
          <a href="../index.html" class="text-pink font-medium" style="text-decoration:none">로그인하러가기</a>
        </p>
      </form>

      <!-- 전송 후 메시지 -->
      <div id="sentMsg" class="hidden" style="text-align:center;padding:1.5rem 0;display:flex;flex-direction:column;gap:1rem;align-items:center">
        <div style="width:3.5rem;height:3.5rem;border-radius:50%;background:var(--mint);display:flex;align-items:center;justify-content:center">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#2d7a64" style="width:1.75rem;height:1.75rem">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
          </svg>
        </div>
        <p class="font-bold" style="font-size:1rem">이메일을 전송했어요</p>
        <p class="text-muted text-sm" id="sentEmail"></p>
        <p class="text-sm text-muted">메일함을 확인하고 링크를 클릭해 비밀번호를 재설정하세요.<br>메일이 도착하지 않았다면 스팸함도 확인해 보세요.</p>
        <a href="../index.html" class="btn btn-primary btn-full" style="margin-top:0.5rem">로그인하러가기</a>
      </div>

    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module">
    import { requireGuest } from '../js/auth/authState.js';
    import { sendPasswordReset } from '../js/services/authService.js';
    import { showError, clearAllErrors, isValidEmail } from '../js/utils/validation.js';
    import { showToast } from '../js/utils/toast.js';

    await requireGuest();

    const form    = document.getElementById('resetForm');
    const emailEl = document.getElementById('email');
    const resetBtn= document.getElementById('resetBtn');
    const sentMsg = document.getElementById('sentMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAllErrors(form);

      const email = emailEl.value.trim();
      if (!isValidEmail(email)) {
        showError(emailEl, '올바른 이메일을 입력해 주세요.');
        return;
      }

      resetBtn.disabled = true;
      resetBtn.innerHTML = '<span class="spinner"></span> 전송 중...';

      try {
        await sendPasswordReset(email);
        form.classList.add('hidden');
        document.getElementById('sentEmail').textContent = email;
        sentMsg.classList.remove('hidden');
      } catch (err) {
        resetBtn.disabled = false;
        resetBtn.textContent = '재설정 링크 보내기';
        if (err.code === 'auth/user-not-found') {
          showError(emailEl, '가입되지 않은 이메일이예요.');
        } else {
          showToast('이메일 전송에 실패했어요요.', 'error');
        }
      }
    });
  </script>
</body>
</html>
