<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나만의 일기장</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="auth-page" style="justify-content:flex-start;padding-top:3rem">
    <div class="auth-card">

      <div class="auth-logo">
        <h1>회원가입</h1>
        <p>나만의 일기장을 시작해 보세요</p>
      </div>

      <form class="auth-form" id="signupForm" novalidate>

        <!-- 이메일 -->
        <div class="form-group">
          <label class="form-label" for="email">이메일 (아이디)</label>
          <input class="form-input" type="email" id="email" placeholder="이메일을 입력해 주세요" autocomplete="email" />
          <p class="err-msg"></p>
        </div>

        <!-- 닉네임 + 중복확인 -->
        <div class="form-group">
          <label class="form-label" for="nickname">닉네임</label>
          <div style="display:flex;gap:0.5rem">
            <input class="form-input" type="text" id="nickname" placeholder="2~12자 입력해 주세요" style="flex:1" />
            <button type="button" class="btn btn-outline btn-sm" id="checkNickBtn" style="white-space:nowrap;flex-shrink:0">중복확인</button>
          </div>
          <p class="err-msg" id="nickErrMsg"></p>
        </div>

        <!-- 비밀번호 -->
        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input class="form-input" type="password" id="password" placeholder="영문+숫자 8자 이상으로 입력해 주세요" autocomplete="new-password" />
          <p class="err-msg"></p>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="form-group">
          <label class="form-label" for="passwordConfirm">비밀번호 확인</label>
          <input class="form-input" type="password" id="passwordConfirm" placeholder="비밀번호를 다시 입력해 주세요" autocomplete="new-password" />
          <p class="err-msg"></p>
        </div>

        <!-- 휴대폰번호 -->
        <div class="form-group">
          <label class="form-label" for="phone">휴대폰번호</label>
          <input class="form-input" type="tel" id="phone" placeholder="-없이 입력해 주세요" autocomplete="tel" maxlength="11" />
          <p class="err-msg"></p>
        </div>

        <!-- 생년월일 -->
        <div class="form-group">
          <label class="form-label" for="birthdate">생년월일</label>
          <input class="form-input" type="date" id="birthdate" />
          <p class="err-msg"></p>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-full" id="signupBtn">
          가입하기
        </button>

        <p class="text-center text-sm text-muted">
          이미 계정이 있으신가요?
          <a href="../index.html" class="text-pink font-medium" style="text-decoration:none">로그인</a>
        </p>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="../js/auth/signup.js"></script>
</body>
</html>
