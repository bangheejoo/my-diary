<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나만의 일기장</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="app-container">

    <!-- 헤더 -->
    <header class="app-header">
      <span class="logo">내 정보</span>
      <button class="btn-icon" id="logoutBtn" title="로그아웃">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
        </svg>
      </button>
    </header>

    <!-- 탭 -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tabProfile">프로필</button>
      <button class="tab-btn" id="tabNotif">
        알림함
        <span class="badge badge-pink hidden" id="notifBadge" style="margin-left:0.3rem;min-width:1.2rem;padding:0.1rem 0.3rem">0</span>
      </button>
      <button class="tab-btn" id="tabFriends">친구관리</button>
    </div>

    <main class="main-content">

      <!-- 프로필 탭 -->
      <div id="profileTab">

        <!-- 프로필 헤더 -->
        <div style="padding:2rem 1rem 1.5rem;text-align:center;border-bottom:1px solid var(--gray-100)">
          <div class="user-avatar" style="width:4rem;height:4rem;font-size:1.5rem;margin:0 auto 0.75rem">
            <span id="avatarInitial">?</span>
          </div>
          <p class="font-bold" style="font-size:1.1rem" id="profileNickname">-</p>
          <p class="text-muted text-sm" id="profileEmail">-</p>
        </div>

        <!-- 닉네임 변경 -->
        <div style="padding:1rem">
          <p class="section-header" style="padding:0 0 0.75rem">닉네임 변경</p>
          <div style="display:flex;gap:0.5rem">
            <input class="form-input" type="text" id="newNickname" placeholder="새 닉네임 (2~12자)" style="flex:1" />
            <button class="btn btn-outline btn-sm" id="checkNewNickBtn" style="white-space:nowrap;flex-shrink:0">중복확인</button>
          </div>
          <p class="err-msg" id="nickErr"></p>
          <button class="btn btn-primary btn-full" id="saveNicknameBtn" style="margin-top:0.75rem">닉네임 변경하기</button>
        </div>

        <!-- 비밀번호 변경 -->
        <div style="padding:0 1rem 1.5rem;border-top:1px solid var(--gray-100);margin-top:0.5rem;padding-top:1rem">
          <p class="section-header" style="padding:0 0 0.75rem">비밀번호 변경</p>
          <div style="display:flex;flex-direction:column;gap:0.75rem">
            <div class="form-group">
              <label class="form-label" for="currentPw">현재 비밀번호</label>
              <input class="form-input" type="password" id="currentPw" placeholder="현재 비밀번호를 입력해 주세요" autocomplete="current-password" />
              <p class="err-msg"></p>
            </div>
            <div class="form-group">
              <label class="form-label" for="newPw">새 비밀번호</label>
              <input class="form-input" type="password" id="newPw" placeholder="영문+숫자 8자 이상으로 입력해 주세요" autocomplete="new-password" />
              <p class="err-msg"></p>
            </div>
            <div class="form-group">
              <label class="form-label" for="newPwConfirm">새 비밀번호 확인</label>
              <input class="form-input" type="password" id="newPwConfirm" placeholder="새 비밀번호 다시 입력해 주세요" autocomplete="new-password" />
              <p class="err-msg"></p>
            </div>
            <button class="btn btn-primary btn-full" id="savePwBtn">비밀번호 변경하기</button>
          </div>
        </div>

      </div>

      <!-- 알림 탭 -->
      <div id="notifTab" class="hidden">
        <div id="notifList">
          <div class="loading-screen"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- 친구 관리 탭 -->
      <div id="friendsTab" class="hidden">
        <div id="friendsList">
          <div class="loading-screen"><div class="spinner"></div></div>
        </div>
      </div>

    </main>

    <!-- 바텀 네비게이션 -->
    <nav class="bottom-nav">
      <a class="nav-item" href="main.html">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
        <span>홈</span>
      </a>
      <a class="nav-item" href="friends.html">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" /></svg>
        <span>친구</span>
      </a>
      <a class="nav-item active" href="mypage.html">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        <span>내정보</span>
      </a>
    </nav>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="../js/mypage/profile.js"></script>
  <script type="module" src="../js/mypage/notification.js"></script>
</body>
</html>
